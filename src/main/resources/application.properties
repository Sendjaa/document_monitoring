# ============================================================
# FILE UPLOAD
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Path penyimpanan file dokumen
app.upload.dir=./uploads/documents

