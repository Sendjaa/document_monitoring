# ============================================================
# EMAIL - SMTP (Gmail)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dewa4388@gmail.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=noreply@docmonitor.com
app.mail.from-name=Document Monitoring System

# ============================================================
# SCHEDULER (Cron Job)
# ============================================================
# Jalankan setiap hari jam 08:00 pagi
app.scheduler.cron=0 0 8 * * *
# Hari sebelum expired untuk kirim notifikasi AKAN_HABIS
app.scheduler.warning-days=30

# ============================================================
# SECURITY
# ============================================================
app.admin.default-email=admin@docmonitor.com
app.admin.default-password=Admin@123

# ============================================================
# THYMELEAF
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html