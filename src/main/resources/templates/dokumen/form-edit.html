<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body th:replace="~{layout/app :: page('Edit Dokumen', ~{::page-content}, ~{fragments/empty :: empty})}">

    <th:block th:fragment="page-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Edit Dokumen</h1>
                <p class="page-subtitle">Perbarui informasi dokumen yang ada</p>
            </div>
        </div>

        <div class="content-card">
            <div class="document-info" style="background:#f8fafc;padding:16px;border-radius:12px;margin-bottom:20px;border-left:4px solid var(--primary);">
                <h3 style="font-size:14px;font-weight:600;margin-bottom:4px;">Informasi Dokumen Saat Ini</h3>
                <p style="font-size:13px;color:var(--text-muted);">ID: <span th:text="${dokumenId}">-</span></p>
            </div>

            <form th:action="@{/dokumen/edit/{id}(id=${dokumenId})}" th:object="${dokumenDTO}" method="post" enctype="multipart/form-data">

                <div class="form-group">
                    <label for="namaDokumen">Nama Dokumen *</label>
                    <input type="text" id="namaDokumen" th:field="*{namaDokumen}"
                        th:classappend="${#fields.hasErrors('namaDokumen')} ? 'has-error' : ''" required>
                    <div th:if="${#fields.hasErrors('namaDokumen')}" class="error-message" th:errors="*{namaDokumen}"></div>
                </div>

                <!-- Jenis Dokumen -->
                <div class="form-group">
                    <label>Jenis Dokumen *</label>
                    <div style="display:flex;gap:12px;margin-top:6px;">
                        <button type="button" id="btn-pribadi" onclick="pilihJenis('PRIBADI')"
                            style="flex:1;padding:14px 10px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#64748b;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;">
                            <i class="bi bi-person-fill" style="font-size:18px;"></i> Pribadi
                        </button>
                        <button type="button" id="btn-bersama" onclick="pilihJenis('BERSAMA')"
                            style="flex:1;padding:14px 10px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#64748b;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;">
                            <i class="bi bi-people-fill" style="font-size:18px;"></i> Bersama
                        </button>
                    </div>
                    <input type="hidden" id="jenisDokumen" name="jenisDokumen" value="" />
                </div>

                <!-- Sub-Kategori Pribadi -->
                <div id="section-subkat-pribadi" style="display:none;">
                    <div class="form-group">
                        <label>Kategori Dokumen *</label>
                        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;">
                            <button type="button" class="chip-subkat" data-subkat="Identitas" onclick="pilihSubKat(this)"
                                style="padding:8px 16px;border:2px solid #e2e8f0;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#475569;transition:all 0.2s;">
                                <i class="bi bi-card-text"></i> Identitas</button>
                            <button type="button" class="chip-subkat" data-subkat="Pendidikan" onclick="pilihSubKat(this)"
                                style="padding:8px 16px;border:2px solid #e2e8f0;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#475569;transition:all 0.2s;">
                                <i class="bi bi-mortarboard"></i> Pendidikan</button>
                            <button type="button" class="chip-subkat" data-subkat="Legalitas" onclick="pilihSubKat(this)"
                                style="padding:8px 16px;border:2px solid #e2e8f0;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#475569;transition:all 0.2s;">
                                <i class="bi bi-file-earmark-text"></i> Legalitas</button>
                            <button type="button" class="chip-subkat" data-subkat="Kendaraan" onclick="pilihSubKat(this)"
                                style="padding:8px 16px;border:2px solid #e2e8f0;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#475569;transition:all 0.2s;">
                                <i class="bi bi-car-front"></i> Kendaraan</button>
                            <button type="button" class="chip-subkat" data-subkat="Keuangan" onclick="pilihSubKat(this)"
                                style="padding:8px 16px;border:2px solid #e2e8f0;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#475569;transition:all 0.2s;">
                                <i class="bi bi-wallet2"></i> Keuangan</button>
                        </div>
                    </div>
                    <div class="form-group" id="section-dropdown-pribadi" style="display:none;">
                        <label for="kategoriId-pribadi">Pilih Dokumen *</label>
                        <select id="kategoriId-pribadi" onchange="syncKategoriId(this.value)"
                            style="width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;">
                            <option value="">-- Pilih --</option>
                        </select>
                    </div>
                </div>

                <!-- Kategori Bersama -->
                <div id="section-dropdown-bersama" style="display:none;">
                    <div class="form-group">
                        <label for="kategoriId-bersama">Kategori Dokumen *</label>
                        <select id="kategoriId-bersama" onchange="syncKategoriId(this.value)"
                            style="width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;">
                            <option value="">-- Pilih Kategori --</option>
                            <th:block th:each="kat : ${kategoriBersama}">
                                <option th:value="${kat.kategoriId}" th:text="${kat.namaKategori}"
                                    th:selected="${kat.kategoriId == dokumenDTO.kategoriId}">Kategori</option>
                            </th:block>
                        </select>
                    </div>
                </div>

                <!-- Hidden field -->
                <input type="hidden" id="kategoriId" th:field="*{kategoriId}" />

                <!-- Data sub-group -->
                <div id="data-subkat" style="display:none;" aria-hidden="true">
                    <th:block th:each="entry : ${subGroupedPribadi}">
                        <span class="subkat-group" th:attr="data-subkat=${entry.key}">
                            <th:block th:each="kat : ${entry.value}">
                                <span class="subkat-item"
                                    th:attr="data-id=${kat.kategoriId},data-nama=${kat.namaKategori}"></span>
                            </th:block>
                        </span>
                    </th:block>
                </div>

                <!-- Tanggal -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="tanggalMulai">Tanggal Mulai *</label>
                        <input type="date" id="tanggalMulai" th:field="*{tanggalMulai}"
                            th:classappend="${#fields.hasErrors('tanggalMulai')} ? 'has-error' : ''" required>
                        <div th:if="${#fields.hasErrors('tanggalMulai')}" class="error-message" th:errors="*{tanggalMulai}"></div>
                    </div>
                    <div class="form-group">
                        <label for="tanggalBerakhir">Tanggal Berakhir *</label>
                        <input type="date" id="tanggalBerakhir" th:field="*{tanggalBerakhir}"
                            th:classappend="${#fields.hasErrors('tanggalBerakhir')} ? 'has-error' : ''" required>
                        <div th:if="${#fields.hasErrors('tanggalBerakhir')}" class="error-message" th:errors="*{tanggalBerakhir}"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="file">Update File Dokumen (Opsional)</label>
                    <input type="file" id="file" name="file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
                    <small class="text-muted" style="display:block;margin-top:4px;">Kosongkan jika tidak ingin mengubah file.</small>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Update Dokumen
                    </button>
                    <a th:href="@{/dokumen}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Kembali
                    </a>
                </div>
            </form>
        </div>

        <style>
            .btn-jenis-active { border-color: var(--primary,#2563eb)!important; background:#eff6ff!important; color:var(--primary,#2563eb)!important; }
            .chip-subkat-active { border-color: var(--primary,#2563eb)!important; background:var(--primary,#2563eb)!important; color:#fff!important; }
        </style>

        <script th:inline="javascript">
            var currentKategoriId = /*[[${dokumenDTO.kategoriId}]]*/ null;

            var subKatData = {};
            document.querySelectorAll('.subkat-group').forEach(function(grp) {
                var key = grp.getAttribute('data-subkat');
                subKatData[key] = [];
                grp.querySelectorAll('.subkat-item').forEach(function(item) {
                    subKatData[key].push({ id: item.getAttribute('data-id'), nama: item.getAttribute('data-nama') });
                });
            });

            // ── Inisialisasi state dari kategori saat ini ────────────────────────
            (function initState() {
                if (!currentKategoriId) return;
                var idStr = String(currentKategoriId);

                // Cek apakah ini kategori bersama
                var selectB = document.getElementById('kategoriId-bersama');
                for (var i = 0; i < selectB.options.length; i++) {
                    if (selectB.options[i].value == idStr) {
                        pilihJenis('BERSAMA');
                        selectB.value = idStr;
                        syncKategoriId(idStr);
                        return;
                    }
                }

                // Cek kategori pribadi
                for (var sg in subKatData) {
                    var items = subKatData[sg];
                    for (var j = 0; j < items.length; j++) {
                        if (items[j].id == idStr) {
                            pilihJenis('PRIBADI');
                            // Klik chip yang sesuai
                            document.querySelectorAll('.chip-subkat').forEach(function(c) {
                                if (c.getAttribute('data-subkat') === sg) { pilihSubKat(c); }
                            });
                            document.getElementById('kategoriId-pribadi').value = idStr;
                            syncKategoriId(idStr);
                            return;
                        }
                    }
                }
            })();

            function pilihJenis(jenis) {
                document.getElementById('jenisDokumen').value = jenis;
                document.getElementById('btn-pribadi').classList.remove('btn-jenis-active');
                document.getElementById('btn-bersama').classList.remove('btn-jenis-active');
                document.getElementById('kategoriId').value = '';
                if (jenis === 'PRIBADI') {
                    document.getElementById('btn-pribadi').classList.add('btn-jenis-active');
                    document.getElementById('section-subkat-pribadi').style.display = 'block';
                    document.getElementById('section-dropdown-bersama').style.display = 'none';
                    document.querySelectorAll('.chip-subkat').forEach(function(c) { c.classList.remove('chip-subkat-active'); });
                    document.getElementById('section-dropdown-pribadi').style.display = 'none';
                } else {
                    document.getElementById('btn-bersama').classList.add('btn-jenis-active');
                    document.getElementById('section-dropdown-bersama').style.display = 'block';
                    document.getElementById('section-subkat-pribadi').style.display = 'none';
                }
            }

            function pilihSubKat(el) {
                document.querySelectorAll('.chip-subkat').forEach(function(c) { c.classList.remove('chip-subkat-active'); });
                el.classList.add('chip-subkat-active');
                var subkat = el.getAttribute('data-subkat');
                var items = subKatData[subkat] || [];
                var select = document.getElementById('kategoriId-pribadi');
                select.innerHTML = '<option value="">-- Pilih ' + subkat + ' --</option>';
                items.forEach(function(item) {
                    var label = item.nama.replace(subkat + ' - ', '');
                    var opt = document.createElement('option');
                    opt.value = item.id;
                    opt.textContent = label;
                    select.appendChild(opt);
                });
                document.getElementById('section-dropdown-pribadi').style.display = 'block';
            }

            function syncKategoriId(val) {
                document.getElementById('kategoriId').value = val;
            }
        </script>
    </th:block>

</body>
</html>
