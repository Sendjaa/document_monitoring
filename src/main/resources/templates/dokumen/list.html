<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body th:replace="~{layout/app :: page('Daftar Dokumen', ~{::page-content}, ~{::top-actions})}">

    <th:block th:fragment="top-actions">
        <div class="flex gap-2">
            <!-- <a th:href="@{/dokumen/upload-foto}" class="inline-flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-lg transition-all">
                <i class="bi bi-camera-fill"></i> Scan AI
            </a> -->
            <a th:href="@{/dokumen/tambah}" class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-lg transition-all">
                <i class="bi bi-plus"></i> Tambah
            </a>
        </div>
    </th:block>

    <th:block th:fragment="page-content">
        <form th:action="@{/dokumen}" method="get" class="flex gap-2 mb-6 items-center mx-auto max-w-6xl">
            <input type="text" name="keyword" placeholder="Cari nama dokumen..." th:value="${keyword}"
                class="flex-1 px-4 py-2.5 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            <button type="submit" class="px-6 py-2.5 bg-slate-800 text-white text-sm font-semibold rounded-xl hover:bg-slate-900">Cari</button>
            <a th:href="@{/dokumen}" th:if="${keyword != null}" class="px-4 py-2.5 bg-white border border-slate-200 text-slate-600 text-sm font-semibold rounded-xl hover:bg-slate-50">Reset</a>
        </form>

        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mx-auto max-w-6xl">
            <div class="p-5 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h3 class="font-bold text-slate-800 flex items-center gap-2">
                    <i class="bi bi-list-ul text-indigo-600"></i> Semua Dokumen
                    <span class="px-2.5 py-0.5 bg-slate-200 text-slate-600 text-[10px] font-bold rounded-full uppercase" th:text="${dokumenList.size()} + ' dokumen'"></span>
                </h3>
            </div>

            <div th:if="${#lists.isEmpty(dokumenList)}" class="p-12 text-center text-slate-400">
                <i class="bi bi-folder2-open text-5xl opacity-50"></i>
                <h3 class="text-sm font-semibold text-slate-600 mt-4">Tidak ada dokumen ditemukan</h3>
                <p class="text-xs mt-1" th:if="${keyword != null}">Coba kata kunci lain.</p>
            </div>

            <div class="overflow-x-auto" th:unless="${#lists.isEmpty(dokumenList)}">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 uppercase text-[10px] tracking-wider">
                            <th class="px-5 py-4">#</th>
                            <th class="px-5 py-4">Nama Dokumen</th>
                            <th class="px-5 py-4">Kategori</th>
                            <th class="px-5 py-4" th:if="${isAdmin}">Pemilik</th>
                            <th class="px-5 py-4">Mulai</th>
                            <th class="px-5 py-4">Berakhir</th>
                            <th class="px-5 py-4">Sisa</th>
                            <th class="px-5 py-4">Status</th>
                            <th class="px-5 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr th:each="dok, iter : ${dokumenList}" class="hover:bg-slate-50 transition-colors text-sm">
                            <td class="px-5 py-4 text-slate-400 font-medium" th:text="${iter.count}">1</td>
                            <td class="px-5 py-4">
                                <div class="font-bold text-slate-800" th:text="${dok.namaDokumen}">-</div>
                                <div class="text-xs text-slate-400" th:if="${dok.filePath}"><i class="bi bi-paperclip"></i> Ada lampiran</div>
                            </td>
                            <td class="px-5 py-4">
                                <span class="px-2 py-1 bg-slate-100 text-slate-600 text-[11px] font-semibold rounded-lg" th:if="${dok.kategori}" th:text="${dok.kategori.namaKategori}">-</span>
                            </td>
                            <td class="px-5 py-4" th:if="${isAdmin}" th:text="${dok.user?.name ?: '-'}">-</td>
                            <td class="px-5 py-4 text-slate-600" th:text="${dok.tanggalMulai}">-</td>
                            <td class="px-5 py-4 text-slate-600" th:text="${dok.tanggalBerakhir}">-</td>
                            <td class="px-5 py-4 font-bold" th:text="${dok.sisaHari >= 0 ? dok.sisaHari + ' hri' : 'Expired'}"
                                th:classappend="${dok.sisaHari < 0 ? 'text-rose-600' : (dok.sisaHari <= 30 ? 'text-amber-600' : 'text-emerald-600')}"></td>
                            <td class="px-5 py-4">
                                <span class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase" 
                                      th:classappend="${dok.status.name() == 'AKTIF' ? 'bg-emerald-100 text-emerald-700' : (dok.status.name() == 'AKAN_HABIS' ? 'bg-amber-100 text-amber-700' : 'bg-rose-100 text-rose-700')}"
                                      th:text="${dok.status.label}">-</span>
                            </td>
                            <td class="px-5 py-4 text-center">
                                <div class="flex justify-center gap-2">
                                    <a th:href="@{/dokumen/{id}(id=${dok.dokumenId})}" class="p-2 hover:bg-indigo-50 text-indigo-600 rounded-lg"><i class="bi bi-eye"></i></a>
                                    <a th:href="@{/dokumen/edit/{id}(id=${dok.dokumenId})}" class="p-2 hover:bg-slate-100 text-slate-600 rounded-lg"><i class="bi bi-pencil"></i></a>
                                    <form th:action="@{/dokumen/hapus/{id}(id=${dok.dokumenId})}" method="post" onsubmit="return confirm('Yakin hapus?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="p-2 hover:bg-rose-50 text-rose-600 rounded-lg"><i class="bi bi-trash"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block>
</body>
</html>
