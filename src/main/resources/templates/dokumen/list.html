<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body th:replace="~{layout/app :: page('Daftar Dokumen', ~{::page-content}, ~{::top-actions})}">

    <th:block th:fragment="top-actions">
        <div class="flex gap-2">
            <a th:href="@{/dokumen/tambah}" class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-lg transition-all">
                <i class="bi bi-plus"></i> Tambah
            </a>
        </div>
    </th:block>

    <th:block th:fragment="page-content">

        <!-- Search -->
        <form th:action="@{/dokumen}" method="get" class="flex gap-2 mb-6 items-center mx-auto max-w-6xl">
            <input type="text" name="keyword" placeholder="Cari nama dokumen..." th:value="${keyword}"
                class="flex-1 px-4 py-2.5 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            <button type="submit" class="px-6 py-2.5 bg-slate-800 text-white text-sm font-semibold rounded-xl hover:bg-slate-900">Cari</button>
        </form>

        <!-- Dokumen Saya -->
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mx-auto max-w-6xl mb-8">
            <div class="p-5 border-b border-slate-100 bg-slate-50/50">
                <h3 class="font-bold text-slate-800"><i class="bi bi-person-fill text-indigo-600"></i> Dokumen Saya</h3>
            </div>
            <div th:if="${#lists.isEmpty(dokumenList)}" class="p-8 text-center text-slate-400 text-sm">Tidak ada dokumen pribadi.</div>
            <table th:unless="${#lists.isEmpty(dokumenList)}" class="w-full text-left border-collapse">
                <thead class="bg-slate-50 text-xs text-slate-500 uppercase tracking-wide">
                    <tr>
                        <th class="px-5 py-3">Nama Dokumen</th>
                        <th class="px-5 py-3">Kategori</th>
                        <th class="px-5 py-3">Tgl Berakhir</th>
                        <th class="px-5 py-3">Status</th>
                        <th class="px-5 py-3 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr th:each="dok : ${dokumenList}" class="hover:bg-slate-50 transition-colors text-sm">
                        <td class="px-5 py-4 font-semibold text-slate-800" th:text="${dok.namaDokumen}">-</td>
                        <td class="px-5 py-4 text-slate-500" th:text="${dok.kategori?.namaKategori ?: '-'}">-</td>
                        <td class="px-5 py-4 text-slate-600" th:text="${dok.tanggalBerakhir}">-</td>
                        <td class="px-5 py-4">
                            <span th:text="${dok.status}"
                                th:classappend="${dok.status?.name() == 'AKTIF'} ? 'bg-green-100 text-green-700' :
                                               (${dok.status?.name() == 'AKAN_HABIS'} ? 'bg-yellow-100 text-yellow-700' :
                                               'bg-red-100 text-red-700')"
                                class="px-2 py-1 rounded-full text-xs font-semibold">-</span>
                        </td>
                        <td class="px-5 py-4 text-center">
                            <div class="flex justify-center gap-1">
                                <a th:href="@{/dokumen/{id}(id=${dok.dokumenId})}"
                                    class="p-2 hover:bg-indigo-50 text-indigo-600 rounded-lg" title="Detail">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/dokumen/edit/{id}(id=${dok.dokumenId})}"
                                    class="p-2 hover:bg-amber-50 text-amber-600 rounded-lg" title="Edit">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/dokumen/hapus/{id}(id=${dok.dokumenId})}" method="post"
                                    onsubmit="return confirm('Hapus dokumen ini?')">
                                    <button type="submit"
                                        class="p-2 hover:bg-red-50 text-red-500 rounded-lg" title="Hapus">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Dokumen Bersama -->
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mx-auto max-w-6xl">
            <div class="p-5 border-b border-slate-100 bg-slate-50/50">
                <h3 class="font-bold text-slate-800"><i class="bi bi-people-fill text-emerald-600"></i> Dokumen Bersama</h3>
            </div>
            <div th:if="${#lists.isEmpty(dokumenKolaborasi)}" class="p-8 text-center text-slate-400 text-sm">Belum ada dokumen kolaborasi.</div>
            <table th:unless="${#lists.isEmpty(dokumenKolaborasi)}" class="w-full text-left border-collapse">
                <thead class="bg-slate-50 text-xs text-slate-500 uppercase tracking-wide">
                    <tr>
                        <th class="px-5 py-3">Nama Dokumen</th>
                        <th class="px-5 py-3">Kategori</th>
                        <th class="px-5 py-3">Tgl Berakhir</th>
                        <th class="px-5 py-3 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr th:each="dok : ${dokumenKolaborasi}" class="hover:bg-slate-50 transition-colors text-sm">
                        <td class="px-5 py-4 font-semibold text-slate-800" th:text="${dok.namaDokumen}">-</td>
                        <td class="px-5 py-4 text-slate-500" th:text="${dok.kategori?.namaKategori ?: '-'}">-</td>
                        <td class="px-5 py-4 text-slate-600" th:text="${dok.tanggalBerakhir}">-</td>
                        <td class="px-5 py-4 text-center">
                            <a th:href="@{/dokumen/{id}(id=${dok.dokumenId})}"
                                class="p-2 hover:bg-indigo-50 text-indigo-600 rounded-lg" title="Detail">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </th:block>
</body>
</html>
