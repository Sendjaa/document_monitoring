<!doctype html>
<html
  lang="id"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:fragment="page(pageTitle, content, topActions)"
>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title th:text="${pageTitle} + ' - DocMonitor'">DocMonitor</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        overflow-x: hidden;
      }

      /* Tambahkan ini: Sidebar tetap di layar */
      #sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
      }

      /* Pastikan main-content tidak memaksa body untuk scroll */
      .main-content {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        flex: 1; /* Penting agar sidebar dan konten duduk berdampingan */
      }
      .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
      .page-title { font-size:22px; font-weight:700; color:#1e293b; margin:0; }
      .page-subtitle { font-size:13px; color:#64748b; margin:4px 0 0; }

      .content-card { background:#fff; border-radius:16px; padding:24px; box-shadow:0 1px 4px rgba(0,0,0,0.07); }

      .form-group { margin-bottom:18px; }
      .form-group label { display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px; }
      .form-group input[type="text"],
      .form-group input[type="date"],
      .form-group input[type="file"],
      .form-group select {
        width:100%; padding:10px 12px; border:1px solid #e2e8f0;
        border-radius:8px; font-size:14px; outline:none;
        transition:border-color 0.2s;
      }
      .form-group input:focus,
      .form-group select:focus { border-color:#6366f1; }
      .form-group input.has-error { border-color:#ef4444; }
      .error-message { font-size:12px; color:#ef4444; margin-top:4px; }

      .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
      @media(max-width:640px) { .form-row { grid-template-columns:1fr; } }

      .form-actions { display:flex; gap:12px; margin-top:24px; flex-wrap:wrap; }

      .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px;
        border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;
        border:none; text-decoration:none; transition:all 0.2s; }
      .btn-primary { background:#6366f1; color:#fff; }
      .btn-primary:hover { background:#4f46e5; }
      .btn-secondary { background:#f1f5f9; color:#475569; }
      .btn-secondary:hover { background:#e2e8f0; }

      .text-muted { color:#94a3b8; }

      :root {
        --primary: #6366f1;
        --text-muted: #94a3b8;
      }
    </style>
  </head>

  <body class="flex bg-slate-50">
    <div
      class="fixed inset-0 z-40 bg-slate-950/40 backdrop-blur-sm hidden lg:hidden"
      id="sidebarOverlay"
      onclick="closeSidebar()"
    ></div>

    <aside
      id="sidebar"
      class="sidebar fixed lg:static inset-y-0 left-0 z-40 w-64 bg-white border-r border-slate-200 transform -translate-x-full lg:translate-x-0"
    >
      <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    </aside>

    <div class="main-content">
      <header
        class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 lg:px-8 sticky top-0 z-30"
      >
        <div class="flex items-center gap-3">
          <button
            class="lg:hidden p-2 hover:bg-slate-100 rounded-lg"
            onclick="openSidebar()"
          >
            <i class="bi bi-list text-xl"></i>
          </button>
          <h1
            class="font-bold ms-0 lg:ms-10 text-slate-800"
            th:text="${pageTitle}"
          >
            Halaman
          </h1>
        </div>

        <div class="flex items-center gap-3">
          <!-- Bell Notifikasi - tampil di semua halaman -->
          <div class="relative inline-block text-left" id="notification-wrapper">
            <button
              type="button"
              id="notification-button"
              class="relative inline-flex items-center justify-center p-2 text-gray-600 hover:text-indigo-600 bg-gray-50 hover:bg-gray-100 active:bg-gray-200 rounded-lg transition-all border border-gray-200/50 shadow-sm focus:outline-none"
              title="Notifikasi"
            >
              <i class="bi bi-bell text-base"></i>
              <span
                th:if="${unreadCount != null and unreadCount > 0}"
                class="absolute -top-1.5 -right-1.5 inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 text-[10px] font-black text-white bg-rose-500 rounded-full ring-2 ring-white shadow-sm"
              >
                <span th:text="${unreadCount}">0</span>
              </span>
            </button>

            <div
              id="notification-dropdown"
              class="hidden absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-xl border border-gray-100 z-50 origin-top-right"
            >
              <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
                <span class="font-bold text-sm text-gray-800">Notifikasi Terbaru</span>
                <span
                  th:if="${unreadCount != null and unreadCount > 0}"
                  class="text-[11px] font-medium text-rose-500 bg-rose-50 px-2 py-0.5 rounded-full"
                >
                  <span th:text="${unreadCount}">0</span> Baru
                </span>
              </div>

              <div class="max-h-72 overflow-y-auto divide-y divide-gray-50">
                <th:block th:if="${notifications != null and !#lists.isEmpty(notifications)}">
                  <a
                    th:each="notif : ${notifications}"
                    th:href="@{/dokumen/{id}(id=${notif.dokumenId})}"
                    class="flex items-start gap-3 px-4 py-3 hover:bg-slate-50 transition-colors no-underline"
                  >
                    <i
                      th:class="'bi ' + ${notif.icon} + (${notif.iconClass == 'urgent'} ? ' text-rose-500' : ' text-amber-500')"
                      class="text-sm mt-0.5 shrink-0"
                    ></i>
                    <div class="min-w-0">
                      <p
                        th:text="${notif.title}"
                        th:classappend="${notif.iconClass == 'urgent'} ? 'text-rose-600' : 'text-amber-600'"
                        class="text-xs font-semibold mb-0.5"
                      ></p>
                      <p th:text="${notif.message}" class="text-[11px] text-gray-500 line-clamp-2"></p>
                      <span class="text-[10px] text-gray-400 block mt-1">
                        <i class="bi bi-clock mr-1"></i>
                        <span th:text="${notif.time}"></span>
                      </span>
                    </div>
                  </a>
                </th:block>

                <div
                  th:if="${notifications == null or #lists.isEmpty(notifications)}"
                  class="py-8 text-center text-gray-400"
                >
                  <i class="bi bi-bell-slash text-2xl block mb-2 text-gray-300"></i>
                  <span class="text-xs">Tidak ada notifikasi baru</span>
                </div>
              </div>

              <div class="p-2 border-t border-gray-100 bg-gray-50/50 rounded-b-xl">
                <a
                  th:href="@{/notifikasi}"
                  class="block text-center py-2 text-xs font-bold text-indigo-600 hover:text-indigo-700 transition-colors no-underline"
                >
                  Lihat Semua Notifikasi
                </a>
              </div>
            </div>
          </div>

          <!-- topActions dari masing-masing halaman (tombol tambah, dll) -->
          <th:block th:replace="${topActions}"></th:block>
        </div>

        <script>
          document.addEventListener("DOMContentLoaded", function () {
            const wrapper = document.getElementById("notification-wrapper");
            const button = document.getElementById("notification-button");
            const dropdown = document.getElementById("notification-dropdown");
            if (button && dropdown) {
              button.addEventListener("click", function (e) {
                e.stopPropagation();
                dropdown.classList.toggle("hidden");
              });
              document.addEventListener("click", function (e) {
                if (!wrapper.contains(e.target)) {
                  dropdown.classList.add("hidden");
                }
              });
            }
          });
        </script>
      </header>

      <main class="flex-1 p-4 lg:p-8">
        <div class="content-wrapper mx-auto">
          <div
            th:if="${success}"
            class="mb-4 p-4 bg-green-50 text-green-700 rounded-lg text-sm"
            th:text="${success}"
          ></div>
          <div
            th:if="${error}"
            class="mb-4 p-4 bg-red-50 text-red-700 rounded-lg text-sm"
            th:text="${error}"
          ></div>

          <th:block th:replace="${content}"></th:block>
        </div>
      </main>
    </div>

    <nav
      class="lg:hidden fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 z-50 pb-[env(safe-area-inset-bottom)]"
    >
      <div class="flex justify-around items-center h-16 px-1">
        <a
          th:href="@{/dashboard}"
          class="flex flex-col items-center justify-center w-full h-full text-slate-500"
          th:classappend="${activeMenu == 'dashboard'} ? 'text-indigo-700 font-bold' : ''"
        >
          <i class="bi bi-speedometer2 text-lg"></i
          ><span class="text-[9px] mt-0.5">Dashboard</span>
        </a>
        <a
          th:href="@{/dokumen}"
          class="flex flex-col items-center justify-center w-full h-full text-slate-500"
          th:classappend="${activeMenu == 'dokumen'} ? 'text-indigo-700 font-bold' : ''"
        >
          <i class="bi bi-folder2-open text-lg"></i
          ><span class="text-[9px] mt-0.5">Dokumen</span>
        </a>
        <div class="relative -top-6">
          <a
            th:href="@{/dokumen/tambah}"
            class="flex items-center justify-center w-14 h-14 bg-indigo-600 text-white rounded-full shadow-lg border-4 border-slate-50 hover:bg-indigo-700 transition-transform active:scale-95"
          >
            <i class="bi bi-plus-lg text-2xl"></i>
          </a>
        </div>
        <a
          th:href="@{/notifikasi}"
          class="flex flex-col items-center justify-center w-full h-full text-slate-500"
          th:classappend="${activeMenu == 'notifikasi'} ? 'text-indigo-700 font-bold' : ''"
        >
          <i class="bi bi-bell text-lg"></i
          ><span class="text-[9px] mt-0.5">Notif</span>
        </a>
        <a
          th:href="@{/profil}"
          class="flex flex-col items-center justify-center w-full h-full text-slate-500 overlay-hidden"
          th:classappend="${activeMenu == 'profil'} ? 'text-indigo-700 font-bold' : ''"
        >
          <i class="bi bi-person-circle text-lg"></i
          ><span class="text-[9px] mt-0.5">Profil</span>
        </a>
      </div>
    </nav>

    <script>
      function openSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebarOverlay");
        sidebar.classList.remove("-translate-x-full");
        overlay.classList.remove("hidden");
      }

      function closeSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebarOverlay");
        sidebar.classList.add("-translate-x-full");
        overlay.classList.add("hidden");
      }
    </script>
  </body>
</html>
