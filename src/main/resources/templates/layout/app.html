<!doctype html>
<html lang="id" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" 
      th:fragment="page(pageTitle, content, topActions)">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title th:text="${pageTitle} + ' - DocMonitor'">DocMonitor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .sidebar { transition: transform 0.3s ease-in-out; }
        .main-content { min-height: 100vh; display: flex; flex-direction: column; width: 100%; }
        /* Memastikan konten utama tidak meluap */
        .content-wrapper { flex: 1; width: 100%; max-width: 1280px; margin: 0 auto; }
    </style>
</head>

<body class="flex bg-slate-50">

    <div class="fixed inset-0 z-40 bg-slate-950/40 backdrop-blur-sm hidden lg:hidden" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <aside id="sidebar" class="sidebar fixed lg:static inset-y-0 left-0 z-40 w-64 bg-white border-r border-slate-200 transform -translate-x-full lg:translate-x-0">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    </aside>

    <div class="main-content">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 lg:px-8 sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <button class="lg:hidden p-2 hover:bg-slate-100 rounded-lg" onclick="openSidebar()">
                    <i class="bi bi-list text-xl"></i>
                </button>
                <h1 class="font-bold ms-0 lg:ms-10 text-slate-800" th:text="${pageTitle}">Halaman</h1>
            </div>

            <div class="flex items-center gap-3">
                <th:block th:replace="${topActions}"></th:block>
            </div>
        </header>

        <main class="flex-1 p-4 lg:p-8">
            <div class="content-wrapper mx-auto">
                <div th:if="${success}" class="mb-4 p-4 bg-green-50 text-green-700 rounded-lg text-sm" th:text="${success}"></div>
                <div th:if="${error}" class="mb-4 p-4 bg-red-50 text-red-700 rounded-lg text-sm" th:text="${error}"></div>
                
                <th:block th:replace="${content}"></th:block>
            </div>
        </main>
    </div>

    <nav class="lg:hidden fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 z-50 pb-[env(safe-area-inset-bottom)]">
        <div class="flex justify-around items-center h-16 px-1">
            <a th:href="@{/dashboard}" class="flex flex-col items-center justify-center w-full h-full text-slate-500" th:classappend="${activeMenu == 'dashboard'} ? 'text-indigo-700 font-bold' : ''">
                <i class="bi bi-speedometer2 text-lg"></i><span class="text-[9px] mt-0.5">Dashboard</span>
            </a>
            <a th:href="@{/dokumen}" class="flex flex-col items-center justify-center w-full h-full text-slate-500" th:classappend="${activeMenu == 'dokumen'} ? 'text-indigo-700 font-bold' : ''">
                <i class="bi bi-folder2-open text-lg"></i><span class="text-[9px] mt-0.5">Dokumen</span>
            </a>
            <div class="relative -top-6">
                <a th:href="@{/dokumen/tambah}" class="flex items-center justify-center w-14 h-14 bg-indigo-600 text-white rounded-full shadow-lg border-4 border-slate-50 hover:bg-indigo-700 transition-transform active:scale-95">
                    <i class="bi bi-plus-lg text-2xl"></i>
                </a>
            </div>
            <a th:href="@{/notifikasi}" class="flex flex-col items-center justify-center w-full h-full text-slate-500" th:classappend="${activeMenu == 'notifikasi'} ? 'text-indigo-700 font-bold' : ''">
                <i class="bi bi-bell text-lg"></i><span class="text-[9px] mt-0.5">Notif</span>
            </a>
            <a th:href="@{/profil}" class="flex flex-col items-center justify-center w-full h-full text-slate-500" th:classappend="${activeMenu == 'profil'} ? 'text-indigo-700 font-bold' : ''">
                <i class="bi bi-person-circle text-lg"></i><span class="text-[9px] mt-0.5">Profil</span>
            </a>
        </div>
    </nav>

    <script>
        function openSidebar() {
            const sidebar = document.getElementById("sidebar");
            const overlay = document.getElementById("sidebarOverlay");
            sidebar.classList.remove("-translate-x-full");
            overlay.classList.remove("hidden");
        }

        function closeSidebar() {
            const sidebar = document.getElementById("sidebar");
            const overlay = document.getElementById("sidebarOverlay");
            sidebar.classList.add("-translate-x-full");
            overlay.classList.add("hidden");
        }
    </script>
</body>
</html>
