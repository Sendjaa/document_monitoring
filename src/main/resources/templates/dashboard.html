<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body th:replace="~{layout/app :: page('Dashboard', ~{::page-content}, ~{::top-actions})}">

    <th:block th:fragment="top-actions">
        <div class="w-full sm:w-auto flex justify-end">
            <a th:href="@{/dokumen/tambah}" 
               class="inline-flex items-center justify-center gap-2 w-full sm:w-auto px-4 py-2 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 rounded-lg transition-all no-underline shadow-sm">
                <i class="bi bi-plus-lg text-sm"></i> 
                <span>Tambah Dokumen</span>
            </a>
        </div>
    </th:block>

    <th:block th:fragment="page-content">
    <div class="flex justify-center w-full min-h-screen bg-slate-50/50">
        <div class="w-full max-w-7xl px-4 sm:px-6 lg:px-8 py-8 space-y-6">
            
            <section class="relative overflow-hidden bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-950 rounded-2xl p-6 sm:p-8 text-white shadow-lg border border-slate-800">
                <div class="relative z-10">
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase bg-white/10 text-emerald-400 border border-white/10 backdrop-blur-md">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> System Online
                    </span>
                    <h1 class="text-xl sm:text-2xl font-extrabold text-white mt-3">
                        Selamat Datang, <span th:text="${currentUser.name}" class="text-indigo-400">User</span>!
                    </h1>
                    <p class="text-xs text-slate-400 font-medium mt-1" th:text="${todayFormatted}"></p>
                </div>
                <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-indigo-500/20 rounded-full blur-3xl"></div>
            </section>

            <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div th:each="stat : ${ { {val: totalDokumen, label: 'Total Dokumen', icon: 'bi-files', color: 'blue'}, {val: dokumenAktif, label: 'Status Aktif', icon: 'bi-check2-circle', color: 'emerald'}, {val: dokumenAkanHabis, label: 'Akan Habis', icon: 'bi-hourglass-split', color: 'amber'}, {val: dokumenKadaluarsa, label: 'Kadaluarsa', icon: 'bi-exclamation-octagon', color: 'rose'} } }"
                     class="bg-white border border-slate-200 p-5 rounded-xl shadow-sm flex items-center gap-4">
                    <div th:class="'w-12 h-12 rounded-xl flex items-center justify-center text-xl bg-' + ${stat.color} + '-50 text-' + ${stat.color} + '-600'">
                        <i th:class="'bi ' + ${stat.icon}"></i>
                    </div>
                    <div>
                        <div class="text-2xl font-black text-slate-900" th:text="${stat.val}">0</div>
                        <div class="text-xs font-semibold text-slate-500" th:text="${stat.label}">Label</div>
                    </div>
                </div>
            </section>

            <section class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-500">Dokumen Terbaru</h3>
                    <a th:href="@{/dokumen}" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 transition-colors">Lihat Semua</a>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50/50 text-slate-400">
                                <th class="p-4 text-[10px] font-bold uppercase">Nama Dokumen</th>
                                <th class="p-4 text-[10px] font-bold uppercase">Kategori</th>
                                <th class="p-4 text-[10px] font-bold uppercase">Sisa Waktu</th>
                                <th class="p-4 text-[10px] font-bold uppercase text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <tr th:each="dok : ${recentDokumen}" class="hover:bg-slate-50/50">
                                <td class="p-4">
                                    <div class="text-sm font-bold text-slate-800" th:text="${dok.namaDokumen}">-</div>
                                    <div class="text-[10px] text-slate-400" th:text="${dok.tanggalBerakhir}">-</div>
                                </td>
                                <td class="p-4 text-xs font-medium text-slate-600" th:text="${dok.kategori?.namaKategori ?: '-'}"></td>
                                <td class="p-4">
                                    <span th:text="${dok.sisaHari >= 0 ? dok.sisaHari + ' Hari' : 'Expired'}"
                                          th:class="${dok.sisaHari < 0 ? 'px-2 py-1 rounded-md text-[10px] font-bold bg-rose-100 text-rose-700' : 
                                                    (dok.sisaHari <= 30 ? 'px-2 py-1 rounded-md text-[10px] font-bold bg-amber-100 text-amber-700' : 
                                                    'px-2 py-1 rounded-md text-[10px] font-bold bg-emerald-100 text-emerald-700')}"></span>
                                </td>
                                <td class="p-4 text-right">
                                    <a th:href="@{/dokumen/{id}(id=${dok.dokumenId})}" class="text-indigo-600 hover:text-indigo-900 font-bold text-xs">Detail</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>
</th:block>

</body>
</html>
