<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body th:replace="~{layout/app :: page('Kelola User', ~{::page-content}, ~{::top-actions})}">

    <th:block th:fragment="top-actions">
        <a th:href="@{/admin}" class="flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold rounded-lg transition-all">
            <i class="bi bi-arrow-left"></i> Kembali
        </a>
    </th:block>

    <th:block th:fragment="page-content">
        <div class="mb-8">
            <h1 class="text-2xl font-extrabold text-slate-900">Kelola User</h1>
            <p class="text-slate-500 text-sm mt-1">Kelola pengguna sistem dan akses mereka</p>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            <div th:if="${#lists.isEmpty(userList)}" class="p-16 text-center text-slate-400">
                <i class="bi bi-people text-5xl opacity-50"></i>
                <h3 class="text-sm font-semibold text-slate-600 mt-4">Belum ada user</h3>
                <p class="text-xs mt-1">Sistem belum memiliki pengguna terdaftar</p>
            </div>

            <div class="overflow-x-auto" th:unless="${#lists.isEmpty(userList)}">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 uppercase text-[10px] tracking-wider">
                            <th class="px-6 py-4">User</th>
                            <th class="px-6 py-4">Email</th>
                            <th class="px-6 py-4">Role</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr th:each="user : ${userList}" class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-xs">
                                        <span th:text="${#strings.substring(user.name, 0, 1)}">U</span>
                                    </div>
                                    <span class="font-semibold text-slate-800 text-sm" th:text="${user.name}">User</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-600" th:text="${user.email}">email@example.com</td>
                            <td class="px-6 py-4">
                                <span class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase"
                                      th:classappend="${user.role == 'ADMIN'} ? 'bg-purple-100 text-purple-700' : 'bg-slate-100 text-slate-600'"
                                      th:text="${user.role}">USER</span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-2.5 py-1 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-bold uppercase">Aktif</span>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <form th:action="@{/admin/users/deactivate/{id}(id=${user.userId})}" method="post"
                                      th:unless="${user.role == 'ADMIN'}"
                                      onsubmit="return confirm('Yakin ingin menonaktifkan user ini?')"
                                      class="inline-block">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="p-2 text-rose-500 hover:bg-rose-50 rounded-lg transition-colors" title="Nonaktifkan">
                                        <i class="bi bi-person-x text-lg"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block>

</body>
</html>
