<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar - DocMonitor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/auth.css}" href="/css/auth.css" />
  </head>
  <body>
    <div class="register-container">
      <div class="brand">
        <div class="brand-icon">📄</div>
        <h1>Buat Akun Baru</h1>
        <p>Daftar untuk mulai monitoring dokumen Anda</p>
      </div>

      <div class="alert alert-error" th:if="${error}">
        <i class="bi bi-exclamation-circle"></i>
        <span th:text="${error}"></span>
      </div>

      <form th:action="@{/auth/register}" method="post" th:object="${userDTO}">
        <input type="hidden" name="inviteToken" th:value="${param.token}" />

        <div class="form-row">
          <div class="form-group">
            <label>Nama Lengkap</label>
            <div class="input-wrapper">
              <i class="bi bi-person input-icon"></i>
              <input
                type="text"
                th:field="*{name}"
                placeholder="Masukkan nama lengkap"
              />
            </div>
          </div>
          <div class="form-group">
            <label>No. Telepon</label>
            <div class="input-wrapper">
              <i class="bi bi-phone input-icon"></i>
              <input
                type="text"
                th:field="*{phone}"
                placeholder="08xx-xxxx-xxxx"
              />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Alamat Email</label>
          <div class="input-wrapper">
            <i class="bi bi-envelope input-icon"></i>
            <input
              type="email"
              th:field="*{email}"
              th:value="${param.email}"
              th:readonly="${param.token != null}"
              placeholder="nama@email.com"
              th:classappend="${#fields.hasErrors('email')} ? 'error-field'"
            />
          </div>
          <div
            class="field-error"
            th:if="${#fields.hasErrors('email')}"
            th:errors="*{email}"
          ></div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="bi bi-lock input-icon"></i>
            <input
              type="password"
              th:field="*{password}"
              placeholder="Minimal 6 karakter"
              th:classappend="${#fields.hasErrors('password')} ? 'error-field'"
            />
          </div>
          <div
            class="field-error"
            th:if="${#fields.hasErrors('password')}"
            th:errors="*{password}"
          ></div>
        </div>

        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />

        <button type="submit" class="btn-register">
          <i class="bi bi-person-plus"></i> Buat Akun
        </button>
      </form>

      <!-- Setelah tombol Buat Akun, sebelum link-login -->
      <div class="divider"><span>atau</span></div>

      <a href="/oauth2/authorization/google" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path
            fill="#EA4335"
            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
          />
          <path
            fill="#4285F4"
            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
          />
          <path
            fill="#FBBC05"
            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
          />
          <path
            fill="#34A853"
            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
          />
          <path fill="none" d="M0 0h48v48H0z" />
        </svg>
        Daftar dengan Google
      </a>

      <div class="link-login">
        Sudah punya akun? <a th:href="@{/auth/login}">Masuk di sini</a>
      </div>
    </div>
    <script>
      document
        .querySelector("form")
        .addEventListener("submit", function (event) {
          const password = document.querySelector(
            'input[type="password"]',
          ).value;
          const email = document.querySelector('input[type="email"]').value;
          const name = document.querySelector('input[type="text"]').value;

          // Validasi Sederhana
          if (name.trim() === "") {
            alert("Nama lengkap tidak boleh kosong!");
            event.preventDefault();
          } else if (!email.includes("@")) {
            alert("Format email tidak valid!");
            event.preventDefault();
          } else if (password.length < 6) {
            alert("Password minimal harus 6 karakter!");
            event.preventDefault(); // Menghentikan pengiriman form jika validasi gagal
          }
        });
    </script>
  </body>
</html>
