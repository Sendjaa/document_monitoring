<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - DocMonitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body>
<div class="register-container">
    <div class="brand">
        <div class="brand-icon">📄</div>
        <h1>Buat Akun Baru</h1>
        <p>Daftar untuk mulai monitoring dokumen Anda</p>
    </div>

    <div class="alert alert-error" th:if="${error}">
        <i class="bi bi-exclamation-circle"></i>
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/auth/register}" method="post" th:object="${userDTO}">
        <div class="form-row">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <div class="input-wrapper">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" th:field="*{name}" placeholder="John Doe"
                           th:classappend="${#fields.hasErrors('name')} ? 'error-field'">
                </div>
                <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="form-group">
                <label>No. Telepon</label>
                <div class="input-wrapper">
                    <i class="bi bi-phone input-icon"></i>
                    <input type="text" th:field="*{phone}" placeholder="08xx-xxxx-xxxx">
                </div>
            </div>
        </div>
        <div class="form-group">
            <label>Alamat Email</label>
            <div class="input-wrapper">
                <i class="bi bi-envelope input-icon"></i>
                <input type="email" th:field="*{email}" placeholder="nama@email.com"
                       th:classappend="${#fields.hasErrors('email')} ? 'error-field'">
            </div>
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
                <i class="bi bi-lock input-icon"></i>
                <input type="password" th:field="*{password}" placeholder="Minimal 6 karakter"
                       th:classappend="${#fields.hasErrors('password')} ? 'error-field'">
            </div>
            <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn-register">
            <i class="bi bi-person-plus"></i> Buat Akun
        </button>
    </form>

    <div class="link-login">
        Sudah punya akun? <a th:href="@{/auth/login}">Masuk di sini</a>
    </div>
</div>
</body>
</html>
