<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Login - DocMonitor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/auth.css}" rel="stylesheet" />
  </head>
  <body>
    <div class="login-container">
      <div class="brand">
        <div class="brand-icon">📄</div>
        <h1>DocMonitor</h1>
        <p>Sistem Monitoring Dokumen Cerdas</p>
      </div>

      <div class="alert alert-error" th:if="${param.error}">
        <i class="bi bi-exclamation-circle"></i>
        <span>Email atau password salah. Silakan coba lagi.</span>
      </div>
      <div class="alert alert-success" th:if="${param.logout}">
        <i class="bi bi-check-circle"></i>
        <span>Anda berhasil keluar.</span>
      </div>
      <div class="alert alert-success" th:if="${success}">
        <i class="bi bi-check-circle"></i>
        <span th:text="${success}">Registrasi berhasil!</span>
      </div>
      <div class="alert alert-error" th:if="${error}">
        <i class="bi bi-exclamation-circle"></i>
        <span th:text="${error}">Terjadi kesalahan.</span>
      </div>

      <form th:action="@{/auth/login}" method="post">
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />
        <div class="form-group">
          <label for="email">Alamat Email</label>
          <div class="input-wrapper">
            <i class="bi bi-envelope input-icon"></i>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="nama@email.com"
              required
              autofocus
              autocomplete="email"
            />
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="bi bi-lock input-icon"></i>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right"></i> Masuk
        </button>
      </form>

      <!-- Divider -->
      <div class="divider"><span>atau</span></div>

      <!-- Tombol Google -->
      <a href="/oauth2/authorization/google" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path
            fill="#EA4335"
            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
          />
          <path
            fill="#4285F4"
            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
          />
          <path
            fill="#FBBC05"
            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
          />
          <path
            fill="#34A853"
            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
          />
          <path fill="none" d="M0 0h48v48H0z" />
        </svg>
        Masuk dengan Google
      </a>

      <div class="link-register">
        Belum punya akun? <a th:href="@{/auth/register}">Daftar sekarang</a>
      </div>

      <!-- <div class="divider"><span>atau</span></div>

      <div class="link-register">
        Belum punya akun? <a th:href="@{/auth/register}">Daftar sekarang</a>
      </div> -->

      <div class="features">
        <div class="feature-item">
          <i class="bi bi-bell"></i> Pengingat Email
        </div>
        <div class="feature-item">
          <i class="bi bi-people"></i> Dokumen Bersama
        </div>
        <div class="feature-item"><i class="bi bi-shield-check"></i> Aman</div>
      </div>
    </div>
  </body>
</html>
