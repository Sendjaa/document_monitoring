<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DocMonitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body>
<div class="login-container">
    <div class="brand">
        <div class="brand-icon">📄</div>
        <h1>DocMonitor</h1>
        <p>Sistem Monitoring Dokumen Cerdas</p>
    </div>

    <div class="alert alert-error" th:if="${error}">
        <i class="bi bi-exclamation-circle"></i>
        <span th:text="${error}">Email atau password salah!</span>
    </div>
    <div class="alert alert-success" th:if="${logout}">
        <i class="bi bi-check-circle"></i>
        <span th:text="${logout}">Berhasil keluar.</span>
    </div>
    <div class="alert alert-success" th:if="${success}">
        <i class="bi bi-check-circle"></i>
        <span th:text="${success}">Registrasi berhasil!</span>
    </div>

    <form th:action="@{/auth/login}" method="post">
        <div class="form-group">
            <label for="email">Alamat Email</label>
            <div class="input-wrapper">
                <i class="bi bi-envelope input-icon"></i>
                <input type="email" id="email" name="email" placeholder="nama@email.com" required autofocus>
            </div>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <i class="bi bi-lock input-icon"></i>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right"></i> Masuk
        </button>
    </form>

    <div class="divider"><span>atau</span></div>

    <div class="link-register">
        Belum punya akun? <a th:href="@{/auth/register}">Daftar sekarang</a>
    </div>

    <div class="features">
        <div class="feature-item">
            <i class="bi bi-camera"></i>
            Scan AI
        </div>
        <div class="feature-item">
            <i class="bi bi-bell"></i>
            Pengingat
        </div>
        <div class="feature-item">
            <i class="bi bi-shield-check"></i>
            Aman
        </div>
    </div>
</div>
</body>
</html>
