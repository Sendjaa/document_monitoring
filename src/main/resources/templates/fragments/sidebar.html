<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<aside th:fragment="sidebar" id="sidebar-menu"
       class="fixed inset-y-0 left-0 z-[60] w-64 bg-slate-900 text-slate-200 flex flex-col justify-between border-r border-slate-800 transition-all duration-300 ease-in-out transform -translate-x-full lg:translate-x-0 font-sans shadow-xl">
    
    <div>
        <div class="p-5 flex items-center justify-between border-b border-slate-800 bg-slate-950/20">
            <div class="flex items-center gap-2.5">
                <div class="text-xl">📄</div>
                <div>
                    <h1 class="text-sm font-bold text-white tracking-wide m-0">DocMonitor</h1>
                    <p class="text-[10px] text-slate-500 m-0">Sistem Monitoring Dokumen</p>
                </div>
            </div>
            <button type="button" 
                    onclick="closeSidebar()" 
                    class="lg:hidden flex items-center justify-center w-8 h-8 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 border border-slate-700/50 transition-colors focus:outline-none cursor-pointer"
                    aria-label="Close sidebar">
                <i class="bi bi-x-lg text-sm"></i>
            </button>
        </div>  

        <nav class="p-4 space-y-6 flex-1 overflow-y-auto">
            <div>
                <div class="text-[10px] font-bold text-slate-500 uppercase tracking-wider px-3 mb-2">Utama</div>
                <div class="space-y-1">
                    <a th:href="@{/dashboard}" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded-lg transition-colors no-underline"
                       th:classappend="${activeMenu == 'dashboard'} ? 'bg-indigo-600 text-white shadow-sm font-semibold' : 'text-slate-400 hover:bg-slate-800/60 hover:text-slate-100'">
                        <i class="bi bi-speedometer2 text-sm"></i> Dashboard
                    </a>
                    <a th:href="@{/dokumen}" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded-lg transition-colors no-underline"
                       th:classappend="${activeMenu == 'dokumen'} ? 'bg-indigo-600 text-white shadow-sm font-semibold' : 'text-slate-400 hover:bg-slate-800/60 hover:text-slate-100'">
                        <i class="bi bi-folder2-open text-sm"></i> Dokumen Saya
                    </a>
                    <a th:href="@{/dokumen/tambah}" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded-lg transition-colors no-underline"
                       th:classappend="${activeMenu == 'dokumen-tambah'} ? 'bg-indigo-600 text-white shadow-sm font-semibold' : 'text-slate-400 hover:bg-slate-800/60 hover:text-slate-100'">
                        <i class="bi bi-plus-circle text-sm"></i> Tambah Dokumen
                    </a>
                </div>
            </div>

            <div sec:authorize="hasRole('ADMIN')">
                <div class="text-[10px] font-bold text-slate-500 uppercase tracking-wider px-3 mb-2">Administrasi</div>
                <div class="space-y-1">
                    <a th:href="@{/admin}" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded-lg transition-colors no-underline"
                       th:classappend="${activeMenu == 'admin'} ? 'bg-indigo-600 text-white shadow-sm font-semibold' : 'text-slate-400 hover:bg-slate-800/60 hover:text-slate-100'">
                        <i class="bi bi-shield-check text-sm"></i> Panel Admin
                    </a>
                    <a th:href="@{/admin/users}" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded-lg transition-colors no-underline"
                       th:classappend="${activeMenu == 'admin-users'} ? 'bg-indigo-600 text-white shadow-sm font-semibold' : 'text-slate-400 hover:bg-slate-800/60 hover:text-slate-100'">
                        <i class="bi bi-people text-sm"></i> Kelola User
                    </a>
                    <a th:href="@{/admin/kategori}" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded-lg transition-colors no-underline"
                       th:classappend="${activeMenu == 'kategori'} ? 'bg-indigo-600 text-white shadow-sm font-semibold' : 'text-slate-400 hover:bg-slate-800/60 hover:text-slate-100'">
                        <i class="bi bi-tags text-sm"></i> Kategori
                    </a>
                </div>
            </div>
        </nav>
    </div>

    <div class="p-4 border-t border-slate-800 bg-slate-950/40 space-y-3">
    <div class="flex items-center justify-between px-2">
        <div class="flex items-center gap-3 min-w-0 flex-grow">
            <a href="#" class="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xs font-bold uppercase flex-shrink-0"
                 th:text="${currentUser?.name != null and !#strings.isEmpty(currentUser.name)} ? ${#strings.substring(currentUser.name, 0, 1)} : 'U'">U</a>
            <a href="#" class="min-w-0">
                <div class="text-xs font-semibold text-white truncate" th:text="${currentUser?.name ?: 'Guest'}">User</div>
                <div class="text-[10px] text-slate-500 uppercase font-medium tracking-wider mt-0.5" th:text="${currentUser?.role ?: 'USER'}">USER</div>
            </a>
        </div>
        
        <a href="#" class="p-1.5 rounded-lg text-slate-400 hover:text-rose-400 hover:bg-slate-800/50 transition-colors no-underline flex-shrink-0"
           title="Keluar Aplikasi"
           onclick="event.preventDefault(); document.getElementById('logout-form').submit();">
            <i class="bi bi-box-arrow-right text-base"></i>
        </a>
    </div>

    <form id="logout-form" th:action="@{/auth/logout}" method="post" class="hidden">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    </form>
</div>
</aside>

</html>
